{% extends "base.html" %}

{% block title %}
Login | GhostVault
{% endblock %}

{% block content %}

<section class="hero">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5">

                <div class="glass-card">

                    <h1 class="text-center mb-4">
                        Welcome Back
                    </h1>

                    <form method="POST">

                        <div class="mb-3">

                            <label>Email</label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                autocomplete="off"
                                required>

                        </div>

                        <div class="mb-4">

                            <label>Password</label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                autocomplete="off"
                                required>

                        </div>

                        <button
                            class="btn btn-primary w-100 btn-lg">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
