{% extends "base.html" %}

{% block title %}
Audit Logs
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="glass-card">

        <h2 class="mb-4">
            Security Audit Logs 🔐
        </h2>

        <table class="table table-dark">

            <thead>
                <tr>
                    <th>Action</th>
                    <th>Time</th>
                </tr>
            </thead>

            <tbody>

                {% for log in logs %}

                <tr>
                    <td>{{ log.action }}</td>
                    <td>{{ log.timestamp }}</td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
