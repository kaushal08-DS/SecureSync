{% extends "base.html" %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="container py-5">

    <h2 class="mb-4">📊 GhostVault Analytics</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="stats-card text-center">
                <h3>{{ file_count }}</h3>
                <p>Total Files</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card text-center">
                <h3>{{ upload_count }}</h3>
                <p>Uploads</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card text-center">
                <h3>{{ delete_count }}</h3>
                <p>Deletes</p>
            </div>
        </div>

    </div>

    <!-- ✅ REAL WORKING CHART -->
    <div class="mt-5">

        

    </div>

</div>

<script>
    const ctx = document.getElementById('activityChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ["Uploads", "Deletes"],
            datasets: [{
                label: "File Activity",
                data: [
                    {{ upload_count }},
                    {{ delete_count }}
                ],
                backgroundColor: [
                    "rgba(59,130,246,0.7)",
                    "rgba(239,68,68,0.7)"
                ],
                borderRadius: 10
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

{% endblock %}
